server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:8000;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https: wss:; img-src 'self' data: https:; media-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /docs {
        proxy_pass $api_upstream/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass $api_upstream/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / { try_files /index.html =404; }
    location = /capabilities { try_files /capabilities.html =404; }
    location = /architecture { try_files /architecture.html =404; }
    location = /security { try_files /security.html =404; }
    location = /login { try_files /login.html =404; }
    location = /privacy { try_files /privacy.html =404; }
    location = /terms { try_files /terms.html =404; }
    location = /workspace { try_files /workspace.html =404; }
    location = /knowledge { try_files /knowledge.html =404; }
    location = /integrations { try_files /integrations.html =404; }

    error_page 404 /404.html;
    location = /404.html { internal; }

    location / { try_files $uri $uri/ =404; }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
