services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracememory_dev
      POSTGRES_USER: tracememory
      POSTGRES_PASSWORD: tracememory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracememory -d tracememory_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./services/api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_NAME: SupportMemory
      DATABASE_URL: postgresql://tracememory:tracememory@postgres:5432/tracememory_dev
      ENVIRONMENT: ${ENVIRONMENT:-development}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      DEFAULT_MODEL_GATEWAY: ${DEFAULT_MODEL_GATEWAY:-qwen}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-max}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      QWEN_VL_MODEL: ${QWEN_VL_MODEL:-qwen-vl-max}
      QWEN_TTS_MODEL: ${QWEN_TTS_MODEL:-qwen3-tts-flash}
      QWEN_ASR_MODEL: ${QWEN_ASR_MODEL:-qwen3-asr-flash}
      QWEN_EMBEDDING_MODEL: ${QWEN_EMBEDDING_MODEL:-text-embedding-v3}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-auto}
      RUNTIME_GOVERNOR_PII_MODE: ${RUNTIME_GOVERNOR_PII_MODE:-hybrid}
      ALIBABA_ACCESS_KEY_ID: ${ALIBABA_ACCESS_KEY_ID:-}
      ALIBABA_ACCESS_KEY_SECRET: ${ALIBABA_ACCESS_KEY_SECRET:-}
      ALIBABA_OSS_BUCKET: ${ALIBABA_OSS_BUCKET:-}
      ALIBABA_OSS_ENDPOINT: ${ALIBABA_OSS_ENDPOINT:-}
      ALIBABA_OSS_REGION: ${ALIBABA_OSS_REGION:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      SIGNING_SECRET: ${SIGNING_SECRET:-replace-with-a-secure-secret}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:-}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      PUBLIC_CONSOLE_URL: ${PUBLIC_CONSOLE_URL:-http://localhost:3000}
      ZENDESK_OAUTH_CLIENT_ID: ${ZENDESK_OAUTH_CLIENT_ID:-}
      ZENDESK_OAUTH_CLIENT_SECRET: ${ZENDESK_OAUTH_CLIENT_SECRET:-}
      INTERCOM_OAUTH_CLIENT_ID: ${INTERCOM_OAUTH_CLIENT_ID:-}
      INTERCOM_OAUTH_CLIENT_SECRET: ${INTERCOM_OAUTH_CLIENT_SECRET:-}
      SLACK_OAUTH_CLIENT_ID: ${SLACK_OAUTH_CLIENT_ID:-}
      SLACK_OAUTH_CLIENT_SECRET: ${SLACK_OAUTH_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      INTEGRATION_ALLOWED_REST_HOSTS: ${INTEGRATION_ALLOWED_REST_HOSTS:-}
      BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN:-}
      DEFAULT_ORGANISATION_ID: ${DEFAULT_ORGANISATION_ID:-org_default}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-wrk_default}
      DEFAULT_PROJECT_ID: ${DEFAULT_PROJECT_ID:-prj_default}
      DEFAULT_ENVIRONMENT_ID: ${DEFAULT_ENVIRONMENT_ID:-dev}
    depends_on:
      postgres:
        condition: service_healthy

  recovery-worker:
    build: ./services/api
    command: python /app/workers/recovery-worker/main.py
    healthcheck:
      disable: true
    environment:
      TRACEMEMORY_API_BASE_URL: http://api:8000
      TRACEMEMORY_WORKER_API_KEY: ${TRACEMEMORY_WORKER_API_KEY:-}
      TRACEMEMORY_WORKER_POLL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-5}
    volumes:
      - ./workers:/app/workers:ro
    depends_on:
      api:
        condition: service_started

  integration-worker:
    build:
      context: .
      dockerfile: workers/integration-worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tracememory:tracememory@postgres:5432/tracememory_dev
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:-}
      INTEGRATION_WORKER_POLL_SECONDS: ${INTEGRATION_WORKER_POLL_SECONDS:-2}
    depends_on:
      postgres:
        condition: service_healthy

  console:
    build: ./apps/console
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
